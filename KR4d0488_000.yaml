body:
  text: 靜春堂集别集類四元提要臣等謹案靜春堂集四卷元袁易撰易字通甫長洲人不求仕進部使者擬薦於朝謝不應行中書省署徽州府石洞書院山長旋亦罷歸居吳淞具區之間築堂曰靜春聚書萬卷手自校定或掉舟載筆牀茶竈古器遊于江湖趙孟俯嘗為畫卧雪圖稱易與龔璛郭麟孫為吳中三君子是集乃易殁之後其子泰所編延祐四年龔璛為之序推之甚至然以王安石擬之殊不相類卷末有厲鶚跋擬以黃陳亦未盡然易詩吐言天拔于陳與義為近與黃庭堅之鎔鑄劖削陳思道之深刻瘦硬其門徑實各别也有元作者綺縟居多易詩雖所傳無幾而風骨遒上固足以高步一時龔璛等所作集序墨迹至明正統中尚存吳訥題其卷末深致向往蓋其人品詩品均有動人遐想者矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五靜春堂詩集目録别集類四元卷一過泰伯廟遊靈岩酬湯師言崑山冬夜見寄寄承天寺書記水仙花過定慧院尋陳舜咨不見諸友約遊虎丘不及往遊蘇子美滄浪故園登開元寺閣觀浮海石佛金鳯花寄錢德鈞德鈞時在錢塘贈竹徑梅隱院觀魚寄湯師言倩德鈞書數詩故章末及之寓西隱菴師賢與唐月心相過分韻得然字贈日者余竹深胡西軒道院竹石題陸義齋香逺亭送湯師言赴杭送潘鶴臞歸侍母題束季博適安齋送王沂父常州學正贈崑山儒醫張生贈禽衍陸生過長安堰杭州客樓開爐日作送湯師言番江書院山長久出還家梅花已謝和師言見寄卷二杭州道中言懷重午客中寄吳中諸友錢德鈞蕭子中湯師言唐希賢月心趙明仲馮景説和送春韻和月心韻送趙明仲番江書院長僕時自石洞書院歸首夏村居雜興七絶八月一日雨後賦兼寄城中諸友呈信州孟能靜總管題錢德鈞水村圖子昂仲賔二公作竹石于後題渡海羅漢像冬日感興並懷德鈞師言月心杭州長至日會戴師奭張仲賔次日雪中再用前韻正月十六日與德鈞子敬翼之洎兒子震遊束季博山園賦詩五首病目廢書雨中獨臥偶賦湖上即事多懷月心之辭題扇唾壺燈檠麈尾鐵如意白海青寄孔退之卷三上張大學士春日雪中春日自城南歸會二友觀書人散後作春日遊廢園和師言遊南園韻送孔退之送蔡松江之饒州石洞書院送樓山長之石洞交代與師言客錢塘凡三月餘師言歸後作詩奉寄寒食日南山招飲馬塍醉為馬墜與南山伯祥會飲湖中暮歸書所見自錢塘歸寄諸友自杭還吳訪德鈞因留論文過午歸途過竹間道院送屠存博去嵗客杭一年多與存博遊故詩意及之邀師言過城南隱居不肯來已而雪作并寄姚子敬題錢翼之所藏華嶽山水圖次師言月夜見寄韻春雨漫興和師言首夏雜興併用書懷雨後寄陸小山和小山雨中見寄和師言窮居即事韻再次前韻題畫來禽瓜黃葵杏花題錢仲昭家菊坡圖卷四新嵗郊居即事村居即事寄陸冶仙和小山夏夜獨坐因公事留驛中遂登姑蘇臺晚望秋夜懷友和翼之秋懷再和贈周生戲調月心送府判常仲寬送趙顯之檢校挽陳徹堂陳仲淵别室别南山上人獨坐懷黃子久郊居寓目隨事輒題得詩九首和師言病中止酒見寄韻題趙明仲鄱陽行藁後春日對雪即事寄師言次月心見寄書懷三月一日過南園報師言諸友再用韻和師言殘春漫興韻靜春堂詩集原序豫讀今文詩不知其為今人者唯於吾通甫為然通甫沒十餘年矣意者亦古矣而猶今也今斯人豈易得哉世之為詩者學古人欲其似出已意欲其新兩端而已然似者多蹈襲新者常崖異唯其似而非似也新而非新也得之渾然又未知古人已意孰先孰後也始可言詩耳一自士去科舉之業例無不為詩北音傷于壯南音失之浮詩文不同宜極于古故今人于宋詩少所許可僅取王半山以其逼唐也然半山豈肯及唐而止三司與宋次道選詩盡在目中矣至于中夜禪悟集句趁胡笳拍則不啻自其口出一大家數造詣迥别殆未可以淺窺若唐人近接六朝凌鮑謝何必多逺挹西漢師蘇李更不疑實致如此使如今人懸擬風雅不過局蹐四言如韋孟自陳束晳補亡曽何繫于刪後重輕哉聲聞以時寖異感發在人則同每况愈下固不可心逺而力不逮亦不可豫於通甫既曰古之人豈必以半山枉通甫譬諸登峯造極循循來徑尚于此乎見之也古人所嘗有者皆有今人所當無者必無靈傑百出清婉明麗抑古謂酷令人愛者非耶憶通甫與豫交上下古今一返諸性情之正豫固望其鳴國家之盛橫經石洞歸而不復出靜春堂手挍萬卷築修亭遂志焉屬其仲子泰輯遺編託豫序死者如可作也顧焉得如通甫者與之評通甫名易姓袁氏吳郡人延祐庚申日南至髙郵龔璛序
