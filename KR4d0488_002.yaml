body:
  text: 靜春堂詩集卷二元袁易撰杭州道中言懷涉世恒多故謀身轉益迂馬周聊逆旅阮藉豈窮途鷺宿依船尾楓凋落酒壺逺行憀慄意對此不能無白霧籠舟楫青山失畫圖往來迷咫尺收歛忽斯須野曠連飛鶻江清映浴鳬還將明媚色且復慰征途堤栁欹招纜汀花笑入舟髙歌鳬鵠起濶視水雲流牢落江淹恨飄零庾信愁都將付尊酒短髮得禁秋憂患看飄瓦浮沉任轉蓬題詩霜葉赤對酒燭花紅嵇阮情何曠陶韋意未窮前賢負髙興不必萬人同重午客中往恨湘纍逺他鄉楚俗同流傳存弔祭汨沒見英雄竹葉於人綠榴花此日紅未須嗟旅泊吾道豈終窮湖上冥冥雨和愁細似塵翠嵐沾玉麈清潤逼綸巾他日看濃抹兹晨傚淺顰遂諳山水意有為若留人令節殊方客虚樓暮雨時何心吟鑄鏡余髮欲成絲昌歜誰浮玉芳醪且滿巵今朝羈旅思更用獨醒為寄呉中諸友錢徳鈞風雨蕭齋裏雞鳴夜向晨簡編心力盡燈火鬢毛新餘地知遊刃何人解斵輪煩君毋割席轉漂暫埃塵蕭子中並馬春風陌髙歌夜雨床追游前夢失漂泊此身忙綠酒西湖色冰肌六月凉難招髯似㦸來對玉成行湯師言卓行拘常調微官更數移君懷同棄屣吾道嘆如絲濩落材髙世飛騰命與時晚成梁棟器剰破十年遲唐希賢月心枉䇿招尋宻髙談謔浪俱他鄉懷楚奏何日攬桓鬚白月垂文練青天落酒壺看君話心事餘子盡﨑嶇趙明仲共話巴山雨曽題華嶽秋儒官雖寂寞公子足風流即擬同呉詠焉知效楚囚江南新作賦寄爾恐添愁馮景說之子華簪裔簞瓢祇晏如為郎應駐輦延客愧無車早托襟期合能容禮法疎一燈何日共料理讀殘書和送春韻浩歌擊折玉妃簪獨立東風思一襟桃蕚帶雲歸洞口栁花因雨老墻隂睡鄉化蝶三春夢客路聞鷗萬里心猶有茂林觴詠處激湍不改晉時音和月心韻陋室僅容書滿榻髙車遂訝席為門溪山卜地闗心近風雨翻江入夢繁烏雀浪傳佳客喜龍蛇新見醉啼痕何時重對蕭蕭竹細影參差過酒樽送趙明仲番江書院長僕時自石洞書院歸詩酒欣欣同里社宦遊那復共山川一朝奉檄雖云喜千里擔簦祇自憐羡子飛騰端在此顧余來往獨翛然番江官暇無餘事還許重來弄釣舡首夏村居雜興七絶江花留我澹相娯沙鳥侵人狎易呼乘興觥船時獨往置身塵網欲何須穿逕幽篁破嫩苔遶池漲綠潑新醅黧黄梢蝶驚還起翠碧窺魚去復來問舍求田計已遲江鄉别業漫委蛇舂鉏屬玉明人眼祇比輞川無好詩遲暮耽書愧斵輪抛書聊憇夢中身翛然一榻誰相過祇有清風似故人灣碕流水轉微瀾隠見遊鯈荇藻間濠上難窮千古意栁隂聊得片時閒汎汎鵁鶄渺渺波烟消日出聴漁歌江天物色無人共城郭風塵柰我何綠樹荆扉晚更幽鱸魚菰菜近堪求故人有興能尋我但覔呉淞欲盡頭八月一日雨後賦兼寄城中諸友今我不樂思出遊宿酒昏昏仍嬾惰安得凉飈破煩鬱竹頭搶地桐隂妥紈扇那能脫腕揮紗巾不覺酣眠墮誰喚飛雲起天末政用此時持贈我渴龍掉尾下飲江列缺為右豐隆左蜿蜒初若彌六合變滅忽復成么麽長江收曀淨千頃落日著山縣半笴白衣蒼狗覺虚無孤鶩斷霞明細瑣人生萬事風雨散苦欲控摶無一可嗟予學道良已晚閱世忘憂今亦頗西疇䆉稏碧參差南埭芙蓉紅婀娜聊尋清景日追逐别復川原秋澹沱故人城郭尚留連何時共鼓呉淞柁呈信州孟能靜總管設官重邦牧宣化馳皇風師師漢百僚獨推黄與龔金章映紫綬非材焉所蒙君侯上宰裔樹立何穹崇神駒籋雲霧威鳯下椅桐昔在英妙日已謁明光宫髧髦拜玉陛秀骨回重瞳帝併持一麾往哉懋汝功屢考上治最野闢蕃春農及兹三錫命厚恩零露濃上饒古名郡穰穰庶物豐誅求入豪吏稅歛或缺供朱旛一戾止起弊如轉蓬坐聞襦袴歌喧呼走兒童侯甞過呉下五馬聲龎龎吾友具朗鑒揖侯廣坐中褚裒得孟嘉千載事畧同伊予慕清裁欲見嗟何從自憐七尺軀仰愧髙飛鴻題錢徳鈞水邨圖子昂仲賔二公作竹石于後無多茅屋滄波遶一半青山竹樹遮宛似吾鄉荒寂地直疑割我白鷗沙枝葉翛然長帶雨坡陀幽處欲飄雲故將竹石期貞士二子風流最絶羣題渡海羅漢像錫飛自有天龍䕶杯渡能令海若趨屑屑往來應自笑區區變幻欲何須冬日感興併懷徳鈞師言月心日帶寒隂暝雲含雪意稠飢烏啼欲下鳴雁去安投物態闗身近年光入鬢流低頭頻覽鏡勛業付悠悠散帙蟫魚走挑燈黠鼠窺温尋經嵗讀感激長年悲糟粕求𤣥理芝蘭藉故知三冬開萬卷須訪董生帷短褐黄埃積髙堂絳帳開東西成契濶嵗月轉低徊青稍還衰栁紅初注小梅城南有幽事興發可能來之子數相顧談諧寫我憂每憐髙誼激端向古人求玉斚流泉酒青旗瞰水樓邀君興飛動己解鷫鸘裘杭州長至日㑹戴師奭張仲賔貞元朝士今遺老南渡王孫不乏賢二妙聮翩今拱璧一官留落尚無氊笑談政用迎陽復汲引懸知到日邉揮翰玉堂如問我短蓑黄犢亂春烟長歌彈鋏日為年晝晷何堪一線添歸艇有時終入手清尊對客漫掀髯雲隂欲落平垂地山色相新稍近簷人散凭髙聊發興半空樓閣雨纎纎次日雪中再用前韻嵗晚敝裘慚乆客雪中僵臥愧髙賢强呼竹葉開金琖細看楊花糝白氊列壑含春人未覺一江趨海勢無邉若為乗興尋安道十幅蒲帆破暮烟故人要我乆忘年我亦相逢意氣添欲喚娉婷歌白雪恰驚㸃綴入蒼髯留連冰柱煩詩筆零亂天花入帽簷待取明朝殘酒醒越山重看翠眉纎正月十六日與徳鈞子敬翼之洎兒子震遊束季博山園賦詩五首我愛山園好芳堂隠薜蘿野雲栖不去風葉掃還多暫憇忘城郭長謡詠澗阿不嫌頻啓鑰重過意如何我愛山園好幽篁積翠重㑹令棲彩鳯勿遣化蒼龍清影參差乆髙標邂逅逢未須猜逕造聊復效吾宗我愛山園好峯嵐絶垢氛石痕常積雨洞穴細飄雲醉臥移時醒晨遊送夕曛數椽吾擬卜半席可能分我愛山園好清池漾細漣幽花欹半笑野鶩睡相聮每醉容山簡因詩憶惠連更期春雨歇來對碧濺濺我愛山園好兼懷地主賢興同招隠賦文繼補亡篇坐納千峰秀無如一壑專斯遊偶不見欲去意悠然病目廢書雨中獨臥偶賦澹墨秋隂暗滿川髙山叢竹亂風烟淋浪稍覺天瓢瀉飛灑還驚瀑布懸病睫朦朧妨逺眺閒身衰謝竟誰憐祇應造物諳疎懶乞與蕭齋聴雨眠遲暮耽書祇嘆嗟更憐阿堵著昏花形容未怕參軍笑方術徒煩坐客誇緗帙暫抛塵爛熳青燈故照髮蒼華衰慵目斷今如此知復何年究五車村徑無人喧鳥雀衡門積雨散逢蒿頻拈藥褁封題懶獨處藜床偃臥髙幻翳本空終掃滅秋容新沐試遊遨為憑湯慰相料理欲數青冥玉兔毫湖上即事多懷月心之辭月轉山横湖水明星河倒影玉壺冰故人天末難持寄來倚髙樓第四層浙東山色渡江青眼底新詩向此成天盡雲低看鶻落日斜風細待潮生顧盼江湖左右分呉山飛雨越山雲兹遊覽結風烟秀獨自題詩轉憶君卷地楊花作雪飛來時弄色尚依依不知華髮添青鏡漫道緇塵染素衣送罷東風身是客午窓半對紫玫瑰家山枕上分明見何處濃香喚夢回拄腹芬芳萬卷餘劇談痛飲亦時須憐君獨抱詩箋注頗憶城南舊酒徒題扇千古錢塘佳麗地名花一朶滿城春樊川已老何堪賦蘇小雖亡更有人飛燕驚鴻擬未真飄飄真欲似行雲入舟山色羞眉黛隔岸榴花避舞裙倚扇風流已絶羣西湖小却欲飛雲不知身是杭州客一曲清歌帶酒聞唾壺同抱尊罍質蒙將沃盥俱敢論才不器得近唾成珠棄置枵然大提攜醉後須長歌空擊缺牢落壯心孤燈檠雁足形模小猶存漢制微低懸花燼宻故照鬢毛稀豈忍捐墻角何須對燭圍露螢乾死後嵗晚澹相依麈尾王謝風流物翩然落手中𤣥談方亹亹舊擲莫怱怱拂席青蠅避障塵白羽同空言移晉鼎千載累清風鐵如意犀玉誇纎巧那堪緩急須晶熒同劍鍔玩弄避珊瑚誰解麾戎壘徒能擊唾壺持將擬諸葛碌碌笑狂夫白海青尚方有賜江浙省臣白海青者杭州人士美以歌詩徴余同賦渺渺東溟刷羽翰乍隨天馬萬人觀孤飛雪㸃青雲破一擊秋生玉宇寛賜予豈將追雁鶩馳驅直欲辨梟鸞江南明月雖同色夢想瑶階白露漙寄孔退之昔從茂苑觀為政江動雲飛五月秋已識威名彌屬望相看談笑更風流才華祇解逢人說薄劣真慚與子遊遥對青山憶丰度幾回獨倚仲宣樓靜春堂詩集卷二
