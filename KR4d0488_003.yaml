body:
  text: 靜春堂詩集卷三元袁易撰上張大學士玉節飄飄拂錦韀宫袍猶帶御爐烟承恩始覺詞臣貴問俗爭迎使者先近侍鳴珂依日月南遊染翰動山川更須一試調元手爛熳為霖下九天春日雪中蕭齊聽寒雨出户霰已集飛英㸃砌銷緑苔稍沾濕紛紛漸填委勢若包原隰冥觀隂陽妙欲張故先歙定知陳荄下已有春風入危坐愁苦思急雪鳴窗櫺碧筠助蕭瑟音響有餘清啾啾寒雀聚肅肅髙鴻驚撫物易感興濁醪時一傾獨酌誰寤歌閒襟徒自盈窮居散書帙閉門風雪中聖賢有遺意眇邈殆難通千秋紙上塵欲論誰與同掩卷且須臥時聆響幽叢孤懷偶便靜敢慕髙人踪春日自城南歸㑹二友觀書人散後作花栁垂垂放風烟淡淡晴路長閒信馬春淺未聞鶯心與遊絲逺興隨吹笛生欲攜尊酒去對取亂山傾二仲能相過慚非蔣詡居麈毛頻落飯螙葉亂翻書膠合精神際珠生咳唾餘驪駒惜輕賦幽興晚蕭疏春日遊廢園種花移竹為誰營過眼風烟祇暗驚試數舊題竒石少尚論他日曲池平垂楊臥水僛僛舞細草侵階故故生偶與春光共流轉緑尊對此竟須傾和師言遊南園韻竹裏亭臺納翠光席邉泉石坐仙鄉驚飛水鳥爭魚出吹盡林花草自香誰把洞簫吟嶰谷似聽鄰笛在山陽諷君詩句雲烟動轉覺蒼崖晚更蒼是日坐上有吹洞簫者送孔退之笑談玉麈清風起手滑冰壺雪片虛信宿暫疏情已惡數州相望意何如江淹别恨蒼茫外阮籍窮途潦倒餘目送故人猶作客明朝懷抱向誰舒送蔡松江之饒州石洞書院寂歷雙峯絃誦室遺書長共白雲扄絶憐皓首窺章句不似青山見典型隨牒非才心自愧同僚得子眼還醒鱣堂㑹有千人聽細聽傳家舊石經送樓山長之石洞交代昔賢遺緒何寥濶欲振髙風愧不能深喜君才逾十倍豈徒吾事得交承錢塘傾蓋江湖動南浦揚帆曙色凝行矣莫辭千里逺百年禮樂待君興與師言客錢塘凡三月餘師言歸後作詩奉寄燈花猶記别時紅為報君歸我亦東豈意黃塵迷瘦馬尚淹青眼送飛鴻羣山積雪清相射千樹寒梅望欲空何遜揚州才思減試煩妙語喚春風寒食日南山招飲馬塍醉為馬墜錢塘西湖天下竒寒日清明風日美山開錦繡身入畫舟近絲簧春入耳上人發興流俗表攜客看花古塍裏委蛇微徑出荒蕪繚繞重巒當燕几逺尋桃萼失紅霞稍覺風光在流水賞心尚及答芳晨傾蓋何期遇知己晉人禊事得同然介子髙風嗟已矣山懸落日為人歡酒盡青尊遮客起墜馬常吟杜甫詞墜車今悟莊周㫖養生被戮幾自解以酒得全探妙理今我不樂復何為人生如斯良有幾鷲峰蒼翠尚招邀已分青鞋從此始與南山伯祥㑹飲湖中暮歸書所見絳袖維舟並清湖滿鏡愁目成千里近曲罷數峯留寄語憑青鳥知機避白鷗東鄰窺宋久邂逅亦風流風塵天際客弦管道邉樓良夜苦無月殊鄉應更愁精深鍾子聽瀟灑逺公遊頗念羈栖否飛花㸃敝裘自錢塘歸寄諸友蒼崖環抱汀洲口臯亭蜿蜒繞其後勢如奔馬赴平川轡銜約住驚回首折旋起復固多態跋涉往來看亦久不煩山色笑相迎今日扁舟落吾手曠野蕭蕭殘雪淨長堤活活春流走鳴櫓寧嫌亂鵝鶩掛帆似欲窮牛斗飈風忽怒當夜分天畢定知為月守縱橫雨腳散書卷澎湃波聲撼窗牖未須戲侮出惡劇已厭奔馳謝衰朽錢塘留住春復秋千首髙吟負花栁雕鐫擬效西子顰刻劃肯墮無鹽醜角端羞與蠻觸伍胸次不妨雲夢九秋毫得喪良可笑百嵗風燈定何有已矣歸乘下澤車悠然更瀉新豐酒數尺白魚鬐欲奮三寸黃柑香半剖邇來夢境過眼空愈識天公于我厚垂虹在望渺烟水倦翼知還認林藪湯君文妙不加㸃唐子酒酣初撫缶亦知晤語漸有涯逺來相就還能否若人折簡不可招寄與篇詩換瓊玖自杭還吳訪德鈞因留論文過午歸途過竹間道院城郭塵埃傍馬飛此中何地頓能竒蕭蕭殘雪鴉翻急漠漠平田鷺下遲水帶冰澌流窸窣路隨籬落轉逶迤直疑身在宜城畔野店山橋映酒旗曉踏雪泥寒未解暮歸沮洳稍沾裳己驚康樂春生筆更伴彌明睡倚墻共話祇添眉睫喜相看莫問鬢毛蒼從今來往城南道藜杖東風百草香送屠存博去嵗客杭一年多與存博遊故詩意及之百尺朱樓花照天十分金盞酒如泉共聽風雪當今夕却話湖山記往年身世薄遊那可料鬢毛相顧各堪憐慙無賀老風流趣苦欲淹留更繫船邀師言過城南隱居不肯來已而雪作并寄姚子敬嵗云暮矣凍雨零南山密雲如環城閉門讀書華髮生坐與嵗月俱崢嶸哀鴻晝啼各相命吾亦求友紓吾情街衢揚塵紛莫掃一笑相逢幾絶倒丈夫意氣膠在漆白璧明珠豈為寶城南濁醪賤如土地僻叢梅似繁縞割鮮那得效膏粱接宴聊將慰枯槁具區美菜葅半緑大谷雪梨寒更好苦邀鞭轡不可回念子取别何草草歸來懷抱為誰開竒事咄咄令人猜初驚竹樹聲槭槭旋覺庭户光皚皚飛絮散鹽兒女語雪車冰柱猶堪咍惠連賦筆亦何事徒藉司馬煩鄒枚法當對此但飲酒慎勿刻劃瓊與瑰明朝東風土膏釋百鳥喧啾破幽寂杖藜禪榻烟繞鬢問栁灣崎春動色東郭履穿君莫嘆北海尊深我安惜一時㑹合猶少靳百年膠轕終何益思君定卜晏子鄰書聲燈光夜穿壁焉能終日心拳拳長倚城南望城北題錢翼之所藏華嶽山水圖窗含逺嶺綿綿樹門對清江箇箇船此景吾廬朝暮有畫中忽見絶堪憐次師言月夜見寄韻暮烟銷盡月東出明鏡團團飛上天欲向青冥窮逺目不堪光彩照華顛金尊翠勺期何夕紫綺烏紗憶少年詩句喚醒千古夢南樓風物故依然春雨漫興日日春隂祇欲眠强尋南陌復東阡猶殘碧樹花多少莫惜金尊酒十千象管烏絲題往事玉簫錦瑟負華年愁來祇對西山坐捲起疏簾翠接天江上平蕪望欲迷江邉密雨細如絲冥冥白晝飛花急漠漠青林度鳥遲春事又當三月暮人生那得百年期誰能苦惜纒頭錦喚起嬌嬈舞柘枝積雨厭厭愁斷腸暫晴猶得見春陽頻來幽鳥當窗語半落閒花度水香彩筆雕零詩漫興金杯搖蕩酒生光悠悠心緒渾拋却付與遊絲共短長和師言首夏雜興併用書懷四月家家摶黍鳴東岡南埭半隂晴春兼落絮隨流水風引遊絲入太清浮世時時塵事接荒郊日日暮山橫能來相就同雞黍壠上何辭暫輟耕栁花如雪填門巷不到先生絳帳深伏櫪暫淹千里足耽書閒寄百年心乍拋酒盞愁侵鬢忽枉詩篇興滿襟祇欲籠將鵝自去看君醉墨寫來禽百年未放鬢毛斑更復求誰似我頑山鬼吹燈風雨裏漁人爭席水雲間采蘋聊出經南澗攀桂因留賦小山薄劣敢同髙士趣身如飛鳥倦知還雨後寄陸小山飛雨鳴簷似决渠髙歌終日意何如但知書盡五車讀那問家無儋石儲尚憶堂階曽繫馬近傳釡竈欲生魚解頥祇擬尋匡鼎滿腹窮愁得破除閉門十日蕭蕭雨裹飯何人問子桑孤坐性便松桂冷髙歌聲出薜蘿長忽貽短札愁仍破更讀新書喜欲狂安得從君共清嘯祇應容我據胡床和小山雨中見寄滑滑泥中啼野禽東阡南陌復霖霪入空漠漠連平楚竟夕冥冥失故岑仲蔚門前荒草合子真谷口亂雲深棲遲不作干時計空藴經綸一寸心江永浮天接混茫無船可買繫籬傍欲窺七澤窮三楚但見一雲連八荒絳帳髙堂深莫到蒼崖逺樹鬱相望訪君不待帆檣具河廣猶傳葦可杭和師言窮居即事韻城郭烟花裹屋廬蕭然誰識范萊蕪借居種竹憐君達築室移山笑我愚坐久眼看烏几綻醉來頭向墨池濡壯心縱復都銷盡末害狂歌擊唾壺來詩有壯心觸事漸消磨之句雨聲連夕亂鳴簷野色今朝稍入簾緑樹成圍黃鳥度青天欲盡白波粘熊經懶戲愁危坐鵲語無憑喜謾占若話浮名身外事畫蛇無足不須添野水侵扉水滿坡蕭蕭鐵硯久慵磨忽傳翡翠鯨魚句驚見珊瑚碧樹柯深喜交情期管鮑敢將詩律鬭隂何倩誰寫向髙堂壁醉後長歌復短歌再次前韻浮生處處可為廬勝境非人地亦蕪笠澤昔因髙士重冉溪曽為放臣愚憐君噪吻哦詩苦笑我枯腸藉酒濡若問神仙醉鄉近枉尋圓嶠與方壺醉裏花枝拂帽簷醒來花落鳥窺簾林園秉燭須行樂日月煎膠可解粘夢鹿生涯身轉誤維魚嵗事兆難占長江安得成春酒痛飲杯乾自可添北窗無夢到鑾坡寸墨寧堪盾鼻磨任性祇應同社櫟怡顔聊復眄庭柯琴從得趣無弦久酒可忘憂如醉何詩句粗疏君莫笑江湖付與竹枝歌題畫來禽離離玉井露光漙移得精神畫裏看更待秋風紅顆爛墻隂狼藉鳥銜殘瓜故侯一日聲名隱翠蔓千年採摘頻為問金盤供錯落何如秋圃臥輪困黃葵憶昔茙葵花下飲金杯春艷緑鬟欹祇今花似金杯側獨對西風詠折枝杏花擬賦春風碎錦枝含毫無句入支頥趙村當日花千樹白傅風流大好詩題錢仲昭家菊坡圖紅紫紛紛總後塵十年陶令可相親不知坡上秋多少展卷霜風欲拂人仲昭居風憲故云靜春堂詩集卷三
