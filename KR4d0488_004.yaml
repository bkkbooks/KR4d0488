body:
  text: 靜春堂詩集卷四元袁易撰新嵗郊居即事白日無遺照青春入敝廬屠蘇慚後飲桃梗伴間居荒僻逢迎少衰慵拜起徐占年聽雞卜吾得把犁鉏雲葉開清旭霜花散積隂稍欣回凍澤已覺變鳴禽物化爭流疾天機靜玩深東風漸相顧來往補疏林岸幘江臯久移笻野望新草傾將落日樹裏欲回春暖曬隨陽羽晴翻在藻鱗自今還往數魚鳥亦相親村居即事亭皋獨立看雲移併覺青山入杖藜汀草路窮爭地出水禽日落向人啼百年小飲身如寄萬象橫陳句懶題驅使風光詩爛熳令人苦憶浣花溪村北村南鳴水車直疑樹杪著浮槎因居澤國憂農事強起江天管物華當户漫栽彭澤栁何田宜種邵平瓜悠悠作計全疏懶倒罷清尊又日斜睡起西山翠作堆蜿蜒渾欲傍人來政愁塵土無詩句已覺風煙撲酒杯清景彌年供嘯傲浮生何事苦低徊誰能共此悠然意冉冉斜陽白鳥回寄陸冶仙寄語雲間陸士龍近來談笑與誰同圓機往往論千古濁酒時時判一鍾聞道新居營水竹頗勝窮巷散蒿蓬驅馳城郭還知否江水桃花昨夜風和小山夏夜獨坐密竹通風細新荷貼水圓林塘涵倒景河漢轉髙天有興棲霞外無愁到酒邉何煩百錢卜已悟小行年屋角天河白尋源去匪遙祇應廣寒闕共此可憐宵北斗回空濶清風起泬寥騫槎何處覔吾欲泛輕舠膠漆存吾道髙情宿昔同神交懷阮藉夜飲憶元忠兩地牛鳴近何時馬首東酒酣君勿去待我浩歌終臥石雲粘袖乘舟月入蓬物華歸目睫詩句愈頭風有喜成三益毋勞嘆五窮昔賢傾意氣安用萬人同漫浪鷗為侣行藏鷁退飛秋侵蒲栁質月滿薜蘿衣零露濃如瀉間雲薄未歸思君共揮麈相對淡忘機漏水催傳箭繁星拱建杓菰蒲終夜響魴鱮傍人跳篇什何多興風光頗困嘲胡床談詠處著我醉喧囂夜久琴書冷樓髙枕簟清微風過梧葉故作雨來聲濁酒悠然酌新詩向此成殘杯猶在手鼻息已雷鳴髙臥北窗裏無因夢益州行吟風滿袖醉舞月窺樓倒載慚山簡清歌無杜秋逺遊須借問何地可埋憂浪迹供多病牢愁伴獨醒歌長聊自舞詩好欲誰聽老馬元西極遊鵾且北溟賴君時慰我喜變髮星星因公事留驛中遂登姑蘇臺晚望古驛西風起中含水國秋官間公館靜鳥下吏人休移簟微涼入登臺晚興留亂蟬當檻急衆木抱城稠天迥摶蒼鶻山橫走翠虬虛無疑地盡突兀併雲浮絶景嗟才窘微吟怯語遒煙霏生變態鷗鷺傲冥搜初月清如濕殘霞散不收似乘牛渚舫若在武昌樓娃館今荒草吳宫祇廢丘按圖非舊迹訪古莫深愁蘋浦漁歌斷楓根鬼唱幽掠簷聞鶴警照席數螢流止舍慚昭子投亭愧褚裒疏頑能稍稍漂轉付悠悠兹宇閲人久伊誰似我儔途窮翻一笑鬢短耐千憂世故從飄瓦浮生等置郵三更星斗落萬事入搔頭秋夜懷友平生故舊誰知我潦倒襟期子略同縱酒祇拚千日醉讀書少忍十年窮嵗華晼晚欺霜鬢物色凄涼入井桐未用相看嘆搖落古來江漢有秋風屋角闌干北斗垂誰家長笛夜深吹月流河漢天機急秋到山川木葉知老去潘生聊漫賦向來宋玉不勝悲四時代謝渾間事有底窮愁入兩眉和翼之秋懷衡門無馬迹露草有蟲鳴樓上誰家女穿針聞笑聲胡床歌處穩長笛醉來橫此際得吾子掀髯紗帽傾再和千林羣鳥靜兩地一牛鳴月裏山河影風前鼓角聲川原秋浩蕩雲物暮縱橫此夕原缺五字且細傾贈周生人生身幸一丘足豫卜佳城也是賢甚欲與君論此事祇今未辦買山錢戲調月心藥囊近説蛛絲繞酒戒兼聞翠袖開絳帳生徒何日了秋花池閣喚人來淡月微雲相與清思君詩句臥中庭誰謂西風不解意牆根吹散讀書螢南園花竹清如洗每到徘徊不擬還辦取拍浮三百斛醉鄉堂上破除間南蕩東陂爛熳秋問君底事不來遊身如稿木書堆案相伴螙魚何日休扣門載酒可容來懷抱相看得好開祇恐彭宣驚女樂後堂絲竹一時回送府判常仲寬魚鱗邑井古勾吳地控東南擁具區别乘向來猶半刺連銜况復共分符雄藩專轄勞參佐屬邑安居罷呌呼去日翛然舊行旅但添霜雪上髭鬚凝神萬事優遊裏文翰如山不憚煩久淹朱紱從千騎垂上青雲更二藩祖道攀船歌宛轉秋風卷斾看飛翻胸中歷歷知民瘼臺閣從容好細論送趙顯之檢校憲府昔淹從事衫攜書又問浙河帆湖山樓閣秋千仞省闥文符日幾函稍糾掾曹疏冗劇時要賔客上嶄岩蘭臺只恐催軺轉崖石今題是舊銜挽陳徹堂纍世仍簪紱髙名被搢紳二車回步勇真館宿心親凋落嗟前哲參陪阻後塵襄陽耆舊傳紀述付何人髙賢遂如此忽忽死生分竟失崑岡玉祇殘太華雲人間空作誄地下定修文不謂貞元老今為馬鬛墳黃壤千年墓瑤芝一夜霜病初傳稍稍身已去堂堂有子翁堪瞑知生我亦傷白頭流輩盡誰表鄭公鄉陳仲淵别室一桁朱簾護綺疏數拳蒼石蔓寒蒲汝南市上塵如霧誰見仙人隱玉壺粉垣密掩竹修修時見清風舞翠虬若訝此君嫌俗客祇開三徑納羊裘冰壺玉盤粲炯炯清泉墮石寒泠泠羞將白髮三千丈來對靈苖一寸青方瞳緑髮照寒碧冉冉雲氣生裳衣不辭乞汝服食法但恐石上龍蛇飛琴中流水瀾翻落畫裏秋山雜沓來原缺四字傍修竹臥看飢鶴啄莓苔别南山上人擾擾人間萬事非相從時得扣玄機林堂酒半月到席竹院棊殘雲滿衣浮世情緣雖已解丈夫意氣忍輕違費家池上沾巾處此道今無古亦稀折松為麈論如流落盡松花語未休豈但近公如白雪便應著我寄滄洲粗疏頗慕嵇康懶薄劣難追惠逺遊他日重尋黃葉寺碧雲吟罷不勝愁獨坐懷黃子久衡門處窮巷蓬蒿散空垣臥起但書帙往來寡車轅獨謡誰與和風葉一騷怨茅櫩日可愛南窗明更喧蒼筠送修影忽作蛇龍翻人生耳目娛豈在聲色間欣然會心處欲寫竟忘言良友多隔濶邈若參與商衆中見快士蔚然江夏黃詞章發華藻眉目婉清揚如瞻晨星輝燁燁吐寒芒相逢車馬邉俗塵不可障欲申慷慨懷告别復匆忙具區藪澤深髙天雲露長願為雙鴻鵠與子俱飛翔郊居寓目隨事輒題得詩九首雨洗萬象出暄和風日新鷗聲新命侣山色暮迎人絶江捕寒魚赤鯶巨莫逃鰷鱨翻有神騰出如銀刀雜英渾末吐弱栁不勝垂獨得春風意黃金撚作絲罷釣坐盤石水清石粼粼鑑影見毛髮吾今非昔人春風號樹穴達曙簫笳聲殘梅幾點雪猶復照人明把酒清江上扁舟送夕暉行雲杯裏度白鳥鏡中飛決決堰根水跳珠終日鳴班荆坐忘返中有激湍聲乾鵲構危巢拾薪來往飛拮據有餘間猶報行人歸人生百憂集心役鬢毛斑煙雨江南岸舂鉏爾許間和師言病中止酒見寄韻憐君止酒嬰何疾猶復題詩枉故交三月青春看又破數莖白髮若為拋已鉏宿草留微徑肯踏泥途過逺郊喚取載眉開一醉鼓簧調暖玉笙匏題趙明仲鄱陽行藁後新詩别後頓能竒筆勢翩翩直欲飛但怪衣巾清氣襲盡持山郭白雲歸應劉淪落詞人少徐庾雕鐫雅道微拂拭朱絃誰共聽似君髙趣眼中稀春日對雪即事寄師言落梅和雪作團飛鬭舞回風不自持豈但燕鶯寒斂翼頓令桃李淡無姿梁園賞罷須重賦水部題殘更有詩料理物華煩妙筆喚回春色乞花枝次月心見寄書懷世故嬰我懷俗念令人老解憂聊用酒人譏有何好君詩出竒瑰珊瑚間瑶草宛如對長髯清談吾絶倒藜床膝穿穴臥起翻故書僵立困僮僕傳抄愁小胥兀兀竟何事新婦閉一車敢慕陳元龍豪氣猶未除今日風日好嘉辰嗟離羣小桃繁似火江水碧于雲我獨掩關臥無客為書裙但聞松風號蕭爽如秋旻小齋有松數株三月一日過南園報師言諸友素李花繁不見天緑楊氣暖欲生煙飛泉潄口清如玉細草留人軟勝綿數日春隂一日風海棠只擬向來紅南園昨暮渾成雪猶賴相看是醉中栁花吹破百花休及此吾當秉燭遊辛苦虞卿緣底事滿窗白日照窮愁再用韻崇桃積李照青天乳燕鳴鳩隔暖煙漫道遊絲髙百尺祇應春思更綿綿落花池館鳥呼風狼籍薔薇半丈紅何處飛來雙燕子與人相對寂寥中清談難覔許文休欵段聊追馬少遊辦取拍浮三萬斛莫令酒盡作春愁和師言殘春漫興韻登臨特地起長嗟煙樹依依減物華嵗去祇添新白髮春歸猶問續開花懶為二頃求田計悉送千錢留酒家端肯忘機同釣席亂鷗如雪滿平沙城東雲木翠相望城裏飛塵自在忙萬頃江波搖鴨緑百壺春酒瀉鵝黃野禽忽送尊前曲水荇時飄鏡裏香只少紅妝同綵舫清溪白石聽鳴榔靜春堂詩集卷四
