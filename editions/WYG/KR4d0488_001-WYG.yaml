body:
  text: 靜春堂詩集卷一元袁易撰過泰伯廟孤城下白日昃景射枌榆與客上河梁河水寒瀰瀰巋然呉泰伯靈瑣瞰其址升堂閴無人白雲在亷陛淳風暨南服妾婦知敬止禋祀何寂寥廟食不饛簋至徳貴辭讓千乘猶敝屣豈伊常人情簞食形愠喜吾甞憫僚光同室操劍匕神孫且淪薄流俗重已矣伯也諒有靈願言振頽靡𤣥蹤企龍徳懿化慕麟趾遊靈岩緒風散林薄洩露開岩扄兹晨愜清穆曠懷延杳冥九折度峻壁微行窮絶陘夫差昔戾止鏘鏘駐和鈴華旗一以建繽紛朝百靈花飄磴道白樹入端闈青呉娃煽方處越甲蔽長坰千秋魂魄歸過沛涕亦零嗚呼重華後格鬭何由寧秦宫委蔓草漢闕流寒螢惟應金仙姿空山屹亭亭摩足耀八極象教垂千齡酬湯師言崑山冬夜見寄清昊懸白日靈景煥八荒維時星昴中賔餞由朔方夕曛落草頭寒谷晦蒼蒼之子在天末江湖阻且長濟盈恐濡軌欲往悲無梁風吹崑岡裂念子單衣裳短札俄枉辱髙情何慨慷一辭三致意再歌婉成章要我數日期我懷増惋傷數日詎可玩百年亦易量焉能缺耿耿契濶如參商寄承天寺書記號此山赤城亘蒼穹實維仙聖宅上人釋門秀靈氣載營魄浮杯渡三呉爰止雙峨石白雲亦何心皓鶴時歛翮禪扄清唄餘宴坐羣動寂斷除前後際洞徹天人賾我生遊彀中憂勤缺怵惕北風過環堵落葉平地尺中宵念室家嵗晚凍餒廹鬢髪能幾何顧為兒女白明當絶塵機從師振金䇿水仙花疾風吹長林急雪集叢竹飛仙從何來翩然賁空谷初逢恍若驚莊視矧敢黷黄裳韞華藻素服立幽獨昔聞賢達流滄波振遐躅太白御鯨背靈均葬魚腹永傷骨為土緬想人如玉貞魂千秋後流落依草木吾將佩幽芳采采不盈掬過定慧院尋陳舜咨不見城東古招提遺構何代作薜蘿施欄楯流塵翳丹雘岌岌垝垣仆裊裊危柱弱舉頭瞻金像古屋蒼䑕落恭聞西方教冥念貴恬漠班荆䕃雙樹蔽芾亦可託邇來列萬刹中天峙飛閣隆䂓競宏麗至道愈衰薄愛兹遺古意每過必枉䇿故人志雲臥斯焉甘旅泊儒墨豈磷緇寄食共藜藿踟蹰不及見心期悵何邈白雲東北飛縹緲帶皓鶴緬懷肥遁姿清風在寥廓諸友約遊虎丘不及往原疇擁危阜岡巒帶重闉捫蘿稍曲折身已躋嶙峋徑蟠太古石嵓棲百代雲昔王侈厚葬宏模難具陳玉匣閉鳬脛珠襦被龍文重險疲卒伍三泉愁鬼神雄圖乍不滅伯心寜肯冺遺基委勁越餘孽開嬴秦金精既蕩潏劍氣亦沈湮薄遊羡良友覽物酬芳春龍收靈雨旦虎嘯清風晨升髙望八極酒酣氣亦振俯仰視遺跡飄忽如埃塵登臨勿重嘆兹歡信可珍游蘇子美滄浪故園昊穹積長隂寒日光炯碎虚步少城隅物色入遐睇蘇侯故臺沼蕪沒今誰記依依故址存慘慘迴飈厲谷傳魑魅嘯地失神靈衛伊人百夫特文采傾當世立朝罹網羅抱影投荒裔皁淹天馬逸韝困秋鷹鷙空餘意氣雄摩盪山嶽銳生存且飄泊身後何嗟異下泉雖冥冥精爽不可閟孤城千載歸秋風九皋唳登開元寺閣觀浮海石佛招提控城闉飛閣峙千尺白日轉棼輴朱霞覆檐隙升髙覽萬象目眩潛動魄天驚泱漭懸地覺虚無闢閣中兩金像竒姿斵山石當年浮巨海泛泛來中國未聞積水厚能負萬鈞力瞽俗昧𤣥津至人示靈蹟區區拯世心于道詎無益危坐睨隋唐浩刼一朝夕檻前飛鳥逝户外流水疾九衢冠葢埸浮埃浩如積車馬何時閒丹梯展良覿金鳯花灌木振凄風庶草浥零露懍秋兆摇落孤花表貞素蘿生古徑隂迴立虚垣暮芳蕤五色明幽叢九苞聚弱質抱殊姿髙標秉修譽阿閣誰為容軒除自成趣鳯徳諒未衰春榮亦何慕寄錢徳鈞徳鈞時在錢塘驥騄動長嘶髙鴻托孤影丈夫四方志焉能戀鄉井憶昨行邁初嚴裝在俄頃决眥雪壑明矯睇雲路永子行不我過數日懷耿耿曩與子成言竊比韓與邴清風塞寥廓髙誼破溟涬明知忽遐遺蒙谷誰予儆嗣宗詩酒放叔夜交遊屏冲襟憶晤言夙暮發深省載瞻呉洲月遥矚孤山嶺平生故舊心丹霄共光景贈竹徑青士抱竒節名與髙人齊髙人愛入谷對之忘朝飢千載嵇阮林往者六逸谿俗人欲徑造白日蒼雲迷今君在城郭種竹下成蹊比鄰任來往不遣捶藩籬我自用家法此意人得知梅隠院觀魚窈窕轉微徑蕭森見祇園宻林已亭午宿霧始髙騫地迥煩想滅景虚遐眺延陞階啟朱牖頫檻視清泉素鱮散蘋藻文魴媚漪漣水光忽破碎繽紛鬐鬛翻無機藴至樂物微詎可捐伊余值良友追逐相聮翩觀化聊假日達生終忘年匪慕惠施辨願承莊叟言寄湯師言倩徳鈞書數詩故章末及之逺報平安如見君草生官舍不嫌貧山寒猨狖時相命江濶蛟螭夜有神詩句祇添風土異酒杯莫放鬢毛新欲知别後嵇康嬾一紙書題亦倩人寓西隠菴師賢與唐月心相過分韻得然字浪走黄塵祇自憐惠詢前約竟茫然偶棲蘭若耽幽趣轉欲滄洲寄暮年草草詩篇書柿葉蕭蕭鬢髪亂茶煙他時我醉君休去淨掃禪齋共榻眠贈日者余竹深吾宗昔日丹陽尹不問主人過竹所奮然長嘯振林樾滿谷笙簧翠蛟舞我生嗜好頗相似千古清風慙鼻祖余君談天氣吐虹白眼看人坐箕倨吾甞匹馬造堂階隔墻過酒延我語知君旁舍竹如雲借問林園得窺否君言我居安得此但有蓬萊繞環堵竹林嵇阮太廹窄避世雖深觸憎怒要當胷中有千畮世人那得知其處猗猗叢菉比君子維其似之美無度再歌淇澳為君飲醉倒猶能騎馬去胡西軒道院竹石靈石越微雲髙篁嘯飛雨解襟散幽寂清心見琳宇道人方燕坐碧鮮照巾屨客來但對面莊視不得語如觀温伯雪目擊破千慮清風何方來泠然入窓户羣籟起虚谷衆妙㑹靈府飄颻紫鳯鳴蕭瑟驪虬舞伊余墮塵網憧憧困馳騖神栖方外乆夢繞雲臥屢永願繼壺公終當效巢父題陸義齋香逺亭漢廣不可泳江永不可方遐觀貞女遊矯若驚鴻翔兹花亦如之曲池抱明妝絳袖冰雪質翠衣雲錦章褰裳欲往從宛在水中央修姱冶容滅閑都纎態昌倚檻回眺乆頫軒流涕長徘徊初月升厭浥零露瀼漠漠遞幽馥悠悠播微芳相彼亦何心因風為飄揚送湯師言赴杭烜赫忠臣裔飛騰秀士英孝亷敦素履經術繼家聲邑校為官小儒風藉爾行禮還周六典人見魯諸生省署交章上天衢濶步亨溟池鯤速化丹穴鳯長鳴夙昔論襟誼殷勤結弟兄雲泥慚異趣膠漆動深情敢望追王吉寧希薦禰衡湖山有竒句儻許寄柴荆送潘鶴臞歸侍母冉冉虞淵月迴光照我衣蕭蕭大堤馬送客長鳴嘶窮冬霜雪繁陟岡行旅稀子何意浩蕩歸心如奮飛王粲故鄉志江淹南浦悲丈夫各有適聚散焉可期子有白頭親天寒守重闈蠨蛸懸户牖知子行當歸舉觴慈顔和升軒福履綏士生食萬鍾髙堂色養違何如衡門下菽水歡逶迤羡子敦懿義家聲良不虧閒居富詞藻札翰時相貽題束季博適安齋蕭蕭虚楹暮冉冉飛雲入紛紛車馬塵悠悠詎能及凭軒亦何有竹樹相蒙翳雞鳴境逾廓鶴唳林更寂人生貴是身夫豈不願適胡為悔吝端往往在祍席莊生歎坐忘陶令嗟形役兹理信無暌非君諒誰識送王沂父常州學正豐草被長堤春波轉微綠江淹南浦情悠然在吾目吾鄉二三友交誼天倫篤爾來數暌阻旦旦歌伐木陸生既髙騫子亦展遐躅連遊陽羡區並泛荆溪曲是邦號多士文風素云淑矧兹二賢教時雨新沾沐恭聞淑化原其機系庠塾嗚呼季子風千祀今可復若予遲暮姿冥棲滯窮谷經素昧𤣥義漫費百回讀寜希兼善才實愧聞見獨載瞻雙鳯翔髙天引遐矚贈崑山儒醫張生生攜洛陽耆英圖云圖中名燾者某之始祖也園公深谷隠巢父中林居生逢嘉運啟尚拘曲士模豈若洛中叟抱材自卷舒誠著金鉉職忠禆繡衮謨功成遂投紱身退斯懸車逍遥天地中優㳺日月徐相顧髮皓白胥㑹情怡愉既應徳星聚亦彰南極符一時聚冠葢千祀存畫圖老成則已矣典型猶宛如張子有仍孫韜名倉扁徒種杏白雲表蒔藥青山隅利物貴兼濟秉心良不渝咸俾迨爾祖永膺眉夀俱贈禽衍陸生徴士士龍之子孫天馬為駒氣深厚逸才致逺誰能羈少年氣已干牛斗爾來狼狽一緼袍豪蕩肯居狐貉後文豹深藏霧雨濛潛蛟終作風雷吼相徉㕓市昔傾葢執雉定交歡握手燕坐談天試相詰繫蛇掉尾還應首衆人乃欲攘其羭無異醯雞喧甕缶獬冠蟬弁戯推許鼠目麞頭慚老醜嗟予退處操如蚓分與窮猿擅林藪蟲飛蝠伏各有時萬物行藏信非偶文章藻繪亦安用畫虎不成徒類狗寧為牧豬隠蒱博雖非待兔聊株守豻袖無堪厠朝列鹿門政可安農畆君不見千秋麟閣笑獼猴烏用丹青傳不朽過長安堰霜落天清木葉零我勞王事賦宵征三更燈火魚龍動千里星河雁鶩鳴大舶低昂銜尾進扁舟來往一身輕抱闗恐有髙人隠野客低頭愧送迎杭州客樓開爐日作袖長起舞朱樓窄壺缺聴歌綠酒寒故國蓴應歸日老小春花在客中看江山信美終心折風月横陳惜鬢殘千古流傳王粲賦令人登覽動愁端送湯師言番江書院山長風土迢迢呉苪邑送君還憶舊羈栖芝山擁郭蒼龍臥番水粘雲白雁低逺道故因勞夢想一官那得限東西野花芳草江南路千里秋風入馬蹄乆出還家梅花已謝手攜長鑱斵蒼苔雜樹無多取次栽斟酌何郎才思減梅花謝了却歸來梅花謝了却歸來不見繁枝雪作堆桃李向來羞欲死而今紅白滿園開梅花謝了却歸來風裏殘英旋面迴我似穰侯遲見事當時合築避風臺和師言見寄僕時喪制中千仞崗頭亦振衣塵中祇伴白駒馳功名到手終安用憂患凌人竟大竒陶令田園松菊廢王裒冡墓栢楊悲新詩縱寫髙情極得似相看減夢思靜春堂詩集卷一
