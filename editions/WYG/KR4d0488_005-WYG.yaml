body:
  text: 静春堂詩集原䟦静春詩似黄陳學杜徃徃以蒼硬盤鬱出之當是去宋未遥不染元人纎靡之習耳八月一日雨後七古一篇意氣擺脱才情奔放具體大蘇矣鈔本多訛字改定覺眼界爽朗誰云誤書思之更是一適邪丁未七月二十七日半村學人厲鶚記
